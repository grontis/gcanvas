@if (element().src) {
  <img
    [src]="element().src"
    [alt]="element().alt ?? ''"
    [style.object-fit]="element().objectFit ?? 'cover'"
    class="gc-image"
  />
} @else {
  <div class="gc-image-placeholder" aria-label="Image placeholder">
    <!-- Inline SVG placeholder icon -->
    <svg viewBox="0 0 24 24" fill="currentColor" width="48" height="48" aria-hidden="true">
      <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-1.1 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
    </svg>
  </div>
}
