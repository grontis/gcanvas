<div class="gc-insp-section">
  <div class="gc-insp-title">Position &amp; size</div>

  <div class="gc-insp-row">
    <label>Position</label>
    <div class="gc-insp-pair">
      <div class="gc-insp-v">
        <span class="gc-insp-v__axis">X</span>
        <input
          class="gc-insp-input"
          type="number"
          [ngModel]="x()"
          (ngModelChange)="onPositionChange('x', $event)"
        />
        <span class="gc-insp-v__unit">px</span>
      </div>
      <div class="gc-insp-v">
        <span class="gc-insp-v__axis">Y</span>
        <input
          class="gc-insp-input"
          type="number"
          [ngModel]="y()"
          (ngModelChange)="onPositionChange('y', $event)"
        />
        <span class="gc-insp-v__unit">px</span>
      </div>
    </div>
  </div>

  <div class="gc-insp-row">
    <label>Size</label>
    <div class="gc-insp-pair">
      <div class="gc-insp-v">
        <span class="gc-insp-v__axis">W</span>
        <input
          class="gc-insp-input"
          type="number"
          [ngModel]="w()"
          (ngModelChange)="onSizeChange('w', $event)"
        />
        <span class="gc-insp-v__unit">px</span>
      </div>
      <div class="gc-insp-v">
        <span class="gc-insp-v__axis">H</span>
        <input
          class="gc-insp-input"
          type="number"
          [ngModel]="h()"
          (ngModelChange)="onSizeChange('h', $event)"
        />
        <span class="gc-insp-v__unit">px</span>
      </div>
    </div>
  </div>
</div>
