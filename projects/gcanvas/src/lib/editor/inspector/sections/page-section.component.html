<!-- Page identity -->
<div class="gc-insp-section">
  <div class="gc-insp-title">Page</div>

  <div class="gc-insp-row">
    <span class="gc-insp-label">Name</span>
    <label class="gc-insp-v gc-insp-v--text">
      <input
        class="gc-insp-input"
        type="text"
        placeholder="Untitled"
        [ngModel]="pageName()"
        (ngModelChange)="onNameChange($event)"
      />
    </label>
  </div>

  <div class="gc-insp-row">
    <span class="gc-insp-label">Slug</span>
    <label class="gc-insp-v gc-insp-v--text">
      <input
        class="gc-insp-input"
        type="text"
        placeholder="/"
        [ngModel]="pageSlug()"
        (ngModelChange)="onSlugChange($event)"
      />
    </label>
  </div>
</div>

<!-- Canvas / viewport -->
<div class="gc-insp-section">
  <div class="gc-insp-title">Canvas</div>

  <div class="gc-insp-row">
    <span class="gc-insp-label">Background</span>
    <label class="gc-insp-v">
      <span
        class="gc-color-swatch"
        [style.background]="bgColor()"
      ></span>
      <input
        class="gc-insp-input"
        type="text"
        [ngModel]="bgColor()"
        (ngModelChange)="onBgColorChange($event)"
      />
    </label>
  </div>

  <div class="gc-insp-row">
    <span class="gc-insp-label">Max width</span>
    <label class="gc-insp-v">
      <input
        class="gc-insp-input"
        type="number"
        placeholder="—"
        [ngModel]="maxWidth()"
        (ngModelChange)="onMaxWidthChange($event)"
      />
      <span class="gc-insp-v__unit">px</span>
    </label>
  </div>

  <div class="gc-insp-row">
    <span class="gc-insp-label">Padding</span>
    <div class="gc-insp-pair">
      <label class="gc-insp-v">
        <span class="gc-insp-v__axis">X</span>
        <input
          class="gc-insp-input"
          type="number"
          placeholder="0"
          [ngModel]="paddingX()"
          (ngModelChange)="onPaddingXChange($event)"
        />
        <span class="gc-insp-v__unit">px</span>
      </label>
      <label class="gc-insp-v">
        <span class="gc-insp-v__axis">Y</span>
        <input
          class="gc-insp-input"
          type="number"
          placeholder="0"
          [ngModel]="paddingY()"
          (ngModelChange)="onPaddingYChange($event)"
        />
        <span class="gc-insp-v__unit">px</span>
      </label>
    </div>
  </div>
</div>

<!-- SEO -->
<div class="gc-insp-section">
  <div class="gc-insp-title">SEO</div>

  <div class="gc-insp-row">
    <span class="gc-insp-label">Title</span>
    <label class="gc-insp-v gc-insp-v--text">
      <input
        class="gc-insp-input"
        type="text"
        placeholder="Untitled page"
        [ngModel]="seoTitle()"
        (ngModelChange)="onSeoTitleChange($event)"
      />
    </label>
  </div>

  <div class="gc-insp-row">
    <span class="gc-insp-label">Description</span>
    <label class="gc-insp-v gc-insp-v--text">
      <input
        class="gc-insp-input"
        type="text"
        placeholder="Add a description…"
        [ngModel]="seoDesc()"
        (ngModelChange)="onSeoDescChange($event)"
      />
    </label>
  </div>
</div>
