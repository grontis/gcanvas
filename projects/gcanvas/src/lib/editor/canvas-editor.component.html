<gc-editor-chrome-top
  [enablePreview]="enablePreview()"
  [enablePublish]="enablePublish()"
  (publishClicked)="openPublishModal()"
  (previewClicked)="onPreviewClicked()"
/>

<gc-editor-toolbar />

@if (_showLeftPanel()) {
  <gc-editor-left-panel [collapsed]="_leftCollapsed()">
    @if (_unifiedLeft()) {
      <gc-editor-inspector />
    }
  </gc-editor-left-panel>
}

<div
  class="gc-canvas-wrap"
  #canvasWrap
  cdkDropList
  cdkDropListSortingDisabled
  id="gc-canvas-drop-zone"
  [cdkDropListEnterPredicate]="paletteDropPredicate"
  (cdkDropListDropped)="onPaletteDrop($event)"
  (click)="onCanvasWrapClick($event)"
>
  <gc-template-picker
    [enableTemplatePicker]="enableTemplatePicker() && elements().length === 0"
    (templateSelected)="onTemplateSelected($event)"
  />
  <gc-canvas-view [readonly]="readonly()" />
</div>

@if (_showInspector()) {
  <gc-editor-inspector />
}

<!-- Overlays (position: fixed; no layout class needed) -->
<gc-publish-modal
  [open]="_publishOpen()"
  [publishUrl]="publishUrl()"
  (confirmed)="onPublishConfirmed()"
  (closed)="onPublishClosed()"
/>
<gc-command-palette />
<gc-library-modal
  [open]="_libraryOpen()"
  (closed)="onLibraryClosed()"
/>
