@if (paletteService.isOpen()) {
  <div class="gc-cmd-backdrop" (click)="onBackdropClick()">
    <div class="gc-cmd-palette"
      role="dialog"
      aria-modal="true"
      aria-label="Command palette"
      cdkTrapFocus
      (click)="$event.stopPropagation()"
      (keydown)="onKeydown($event)">
      <input
        class="gc-cmd-input"
        type="text"
        placeholder="Type a command..."
        autocomplete="off"
        [value]="paletteService.query()"
        (input)="onQueryChange($event)"
        autofocus
        aria-label="Command search"
      />
      <ul class="gc-cmd-list" role="listbox">
        @for (cmd of paletteService.filteredCommands(); track cmd.id; let i = $index) {
          <li
            class="gc-cmd-item"
            [class.gc-cmd-item--active]="_activeIndex() === i"
            role="option"
            [attr.aria-selected]="_activeIndex() === i"
            (click)="activateCommand(cmd)"
            (mouseenter)="_activeIndex.set(i)"
          >
            <span class="gc-cmd-item__label">{{ cmd.label }}</span>
            @if (cmd.hotkey) {
              <span class="gc-cmd-item__hotkey">{{ cmd.hotkey }}</span>
            }
          </li>
        }
        @empty {
          <li class="gc-cmd-item gc-cmd-item--empty">No commands found</li>
        }
      </ul>
    </div>
  </div>
}
