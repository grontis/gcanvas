<div
  class="gc-palette-grid"
  cdkDropList
  cdkDropListSortingDisabled
  [cdkDropListEnterPredicate]="rejectAllPredicate"
>
  @for (entry of entries; track entry.toolId) {
    <div
      class="gc-palette-tile"
      [class.gc-palette-tile--active]="activeTool() === entry.toolId"
      cdkDrag
      [cdkDragData]="entry"
      (cdkDragEnded)="onTileDragEnded($event)"
      (click)="setTool(entry)"
      [attr.aria-label]="entry.label"
      [attr.title]="entry.label"
    >
      <div
        class="gc-palette-tile__icon"
        [innerHTML]="entry.icon"
      ></div>
      <span class="gc-palette-tile__label">{{ entry.label }}</span>

      <!-- CDK drag preview — shown while dragging -->
      <div *cdkDragPreview class="gc-palette-drag-preview">
        <div [innerHTML]="entry.icon"></div>
        <span>{{ entry.label }}</span>
      </div>
    </div>
  }
</div>
